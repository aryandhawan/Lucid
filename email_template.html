<!-- Research Digest Email Template — Dark (Variant C: Modern Violet Accent) -->
<!-- Table-based layout + inline CSS for email client compatibility -->

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#0f0f14; padding:32px 0;">
  <tr>
    <td align="center">
      <table role="presentation" width="600" cellpadding="0" cellspacing="0">

        <!-- Header -->
        <tr>
          <td style="padding:0 8px 20px 8px;">
            <div style="font-family:Arial, sans-serif; color:#a78bfa; font-size:12px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;">
              Research Digest
            </div>
            <div style="font-family:Arial, sans-serif; color:#f5f5f7; font-size:23px; font-weight:700; margin-top:6px;">
              {{digest_date}}
            </div>
          </td>
        </tr>

        <!-- Paper blocks — repeat per paper -->
        <!-- PAPER_BLOCK_START -->
        <tr>
          <td style="padding:0 8px 14px 8px;">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#18181f; border:1px solid #27272f; border-radius:12px;">
              <tr>
                <td style="padding:20px 24px; border-left:3px solid #a78bfa; border-radius:12px;">
                  <div style="font-family:Arial, sans-serif; color:#a78bfa; font-size:11px; font-weight:700; margin-bottom:10px;">
                    RELEVANCE {{relevance_score}}/10 &nbsp;·&nbsp; arXiv:{{arxiv_id}}
                  </div>
                  <div style="font-family:Arial, sans-serif; color:#f5f5f7; font-size:16px; font-weight:700; line-height:1.4; margin-bottom:10px;">
                    {{title}}
                  </div>
                  <div style="font-family:Arial, sans-serif; color:#a1a1aa; font-size:13.5px; line-height:1.65; margin-bottom:16px;">
                    {{summary}}
                  </div>
                  <table role="presentation" cellpadding="0" cellspacing="0">
                    <tr>
                      <td style="background-color:#a78bfa; border-radius:6px;">
                        <a href="{{chat_url}}" style="display:inline-block; padding:9px 18px; font-family:Arial, sans-serif; color:#18181f; font-size:13px; font-weight:700; text-decoration:none;">
                          Chat about this paper →
                        </a>
                      </td>
                      <td style="width:10px;"></td>
                      <td>
                        <a href="{{pdf_url}}" style="display:inline-block; padding:9px 4px; font-family:Arial, sans-serif; color:#71717a; font-size:13px; text-decoration:none;">
                          View PDF ↗
                        </a>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>
            </table>
          </td>
        </tr>
        <!-- PAPER_BLOCK_END -->

        <!-- Footer -->
        <tr>
          <td style="padding:18px 8px; text-align:center;">
            <span style="font-family:Arial, sans-serif; color:#3f3f46; font-size:11px;">
              Research Automation by Aryan Dhawan
            </span>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
